<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Pokedex - API</title>
</head>
<body onload="init();">
    <header>
        <section class="header">
            <div class="header_title">
                <h2>PokeDex</h2>
            </div>
            <div class="header_input">
                <input onclick="checkPokemonWithLetters()" id="header_input_field" type="text" placeholder="...search">
                <p id="render_input_error"></p>
                <img id="search_icon" src="./assets/img/header_input_search.png" alt="search icon">
            </div>
        </section>
    </header>

    <main>
        <section id="pokemon_render_area" class="pokemon_render_area">

        </section>
    </main>

    <section id="show_more_button_area">
        <button id="show_more_button" onclick="init()">Show more!</button>
    </section>
    <footer>

        <section class="footer_area">
            <h2 id="footer_copyright">Nico Leitz 2026 ©</h2>
        </section>
    </footer>
    
    <script src="./scripts/template.js"></script>
    <script src="script.js"></script>
</body>
</html>
