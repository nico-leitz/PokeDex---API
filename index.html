<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Pokedex - API</title>
</head>
<body onload="init();">
  <header>
    <section class="header">
        <div class="header_title">
            <h2>PokeDex</h2>
        </div>
        <div class="header_search_wrapper">
            <div class="header_input">
                <input id="header_input_field" type="text" placeholder="...search">
                <img onclick="renderPokemonCart()" id="search_icon" src="./assets/img/header_input_search.png" alt="search icon">
            </div>
            <p id="render_input_error"></p>
        </div>

    </section>  
</header>

    <main>
        <section id="pokemon_render_area" class="pokemon_render_area">

        </section>
    </main>

    <section id="show_more_button_area">
        <button id="show_more_button" onclick="init()">Show more!</button>
        <button id="shiny_button" onclick="initShiny()">Show Shiny!!!</button>
        <button id="random_audio" onclick="playRandomPkmnSound()">Play!</button>
    </section>
    <footer>

        <section class="footer_area">
            <h2 id="footer_copyright">Nico Leitz 2026 ©</h2>
        </section>
    </footer>
    
    <script src="./scripts/template.js"></script>
    <script src="script.js"></script>
</body>
</html>
